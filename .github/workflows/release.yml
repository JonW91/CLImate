name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [linux-x64, linux-arm64, osx-x64, osx-arm64, win-x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish CLImate.App -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o dist/${{ matrix.rid }}

      - name: Package
        run: |
          mkdir -p release-assets
          
          VERSION="${GITHUB_REF_NAME#v}"
          
          cd dist/${{ matrix.rid }}
          
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            # Windows - create ZIP
            zip -r "../../release-assets/climate-${{ matrix.rid }}.zip" climate.exe Assets/
            cd ../../release-assets
            sha256sum "climate-${{ matrix.rid }}.zip" > "climate-${{ matrix.rid }}.zip.sha256"
          else
            # Unix - create tar.gz and also create individual binary for compatibility
            tar -czf "../../release-assets/climate-${{ matrix.rid }}.tar.gz" climate Assets/
            
            # For install script compatibility, rename binary to match expected format
            if [[ "${{ matrix.rid }}" == osx-* ]]; then
              RID_FIXED=$(echo "${{ matrix.rid }}" | sed 's/osx-/macos-/')
            else
              RID_FIXED="${{ matrix.rid }}"
            fi
            
            cd ../../release-assets
            sha256sum "climate-${{ matrix.rid }}.tar.gz" > "climate-${{ matrix.rid }}.tar.gz.sha256"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: release-assets/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: List assets
        run: ls -la assets/

      - name: Delete existing release if any
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ${{ github.ref_name }} --repo ${{ github.repository }} --yes 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true